<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>University Transfer Portal | Los Rios CCD</title>
    <style>
        /* Official Los Rios Community College District Color Guide Theme */
        :root {
            --lr-dark-blue: #252d65;      /* Primary Brand Anchor */
            --lr-medium-blue: #215dd6;    /* Interactive elements & links */
            --lr-light-blue: #9cceeb;     /* Borders and structural accents */
            --lr-yellow: #e5bf45;         /* High-contrast brand highlights */
            --lr-charcoal: #374049;       /* Accessible body typography */
            --lr-gray-bg: #f7f7f9;        /* Light clean background structure */
            --white: #ffffff;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
            background-color: var(--lr-gray-bg);
            color: var(--lr-charcoal);
            margin: 0;
            padding: 0;
            line-height: 1.5;
        }

        .header-banner {
            background-color: var(--lr-dark-blue);
            color: var(--white);
            padding: 30px 20px;
            text-align: center;
            border-bottom: 5px solid var(--lr-yellow);
            box-shadow: 0 4px 10px rgba(0, 0, 0, 0.1);
        }

        .header-banner h1 {
            margin: 0;
            font-size: 2rem;
            font-weight: 700;
            letter-spacing: 0.5px;
        }

        .container {
            max-width: 850px;
            margin: 40px auto;
            padding: 0 20px;
        }

        .category-section {
            margin-bottom: 35px;
        }

        .category-title {
            font-size: 1.35rem;
            color: var(--lr-dark-blue);
            border-left: 4px solid var(--lr-yellow);
            padding-left: 12px;
            margin-bottom: 15px;
            font-weight: 700;
        }

        /* Dropdown Lists (Accordion Styling) */
        details {
            background: var(--white);
            margin-bottom: 12px;
            padding: 14px 18px;
            border-radius: 6px;
            border: 1px solid #e1e4e6;
            box-shadow: 0 2px 5px rgba(55, 64, 73, 0.04);
            transition: all 0.2s ease-in-out;
        }

        details[open] {
            box-shadow: 0 4px 12px rgba(37, 45, 101, 0.08);
            border-color: var(--lr-light-blue);
        }

        summary {
            font-weight: 600;
            cursor: pointer;
            outline: none;
            user-select: none;
            color: var(--lr-dark-blue);
        }

        /* Wraps summary components tightly to protect Safari disclosure icon */
        .summary-content {
            display: inline-flex;
            align-items: center;
            gap: 14px;
            vertical-align: middle;
            margin-left: 6px;
        }

        .uni-logo {
            height: 28px;
            width: 38px;
            object-fit: contain;
            background-color: var(--lr-gray-bg);
            border-radius: 4px;
            padding: 2px;
        }

        summary:hover {
            color: var(--lr-medium-blue);
        }

        .details-interior {
            padding-top: 15px;
            margin-top: 12px;
            border-top: 1px solid var(--lr-gray-bg);
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 20px;
        }

        @media(max-width: 600px) {
            .details-interior { 
                grid-template-columns: 1fr; 
                gap: 15px;
            }
        }

        .details-interior h4 { 
            margin: 0 0 8px 0; 
            color: #73777d; 
            font-size: 0.8rem; 
            text-transform: uppercase; 
            letter-spacing: 0.5px;
        }

        .details-interior p {
            margin: 6px 0;
        }

        .details-interior a { 
            color: var(--lr-medium-blue); 
            text-decoration: none; 
            font-weight: 500; 
        }

        .details-interior a:hover { 
            text-decoration: underline; 
            color: var(--lr-dark-blue);
        }

        .tbd-text {
            color: #a3a6ab;
            font-style: italic;
            font-weight: 500;
        }

        .loading { 
            text-align: center; 
            font-style: italic; 
            color: #73777d;
            padding: 40px;
        }
    </style>
</head>
<body>

<header class="header-banner">
    <h1>University Transfer Resource Directory</h1>
</header>

<div class="container">
    <div id="loading" class="loading">Connecting to Los Rios Live Transfer Database...</div>
    <div id="portal-content"></div>
</div>

<script>
    // Paste your deployed Google Apps Script Web App URL here
    const API_URL = "https://script.google.com/macros/s/AKfycbw09_gjgO3pbP6uEBqh1lUx0waCzh4ppkb4VofI05FaLrDgM8emFIXzMdWtesb5gsed/exec";

    // Strictly ordered targets following your sorting specifications
    const categories = [
        "University of California",
        "California State University",
        "Private California University",
        "Out of State University"
    ];

    async function fetchUniversities() {
        try {
            const response = await fetch(API_URL);
            const data = await response.json();
            
            document.getElementById('loading').style.display = 'none';
            renderData(data);
        } catch (error) {
            console.error("Error retrieving dataset:", error);
            document.getElementById('loading').innerText = "Unable to load directory at this moment. Please check back shortly.";
        }
    }

    function renderData(uniList) {
        const container = document.getElementById('portal-content');
        
        categories.forEach(category => {
            const filteredSchools = uniList.filter(school => school.category === category);
            
            if (filteredSchools.length === 0) return; // Skip building empty categories

            const section = document.createElement('div');
            section.className = 'category-section';
            
            const title = document.createElement('h2');
            title.className = 'category-title';
            title.innerText = category;
            section.appendChild(title);

            filteredSchools.forEach(school => {
                const details = document.createElement('details');
                const summary = document.createElement('summary');
                
                // Build layout safely within summary wrapper block
                const summaryContent = document.createElement('div');
                summaryContent.className = 'summary-content';
                
                if (school.logoUrl) {
                    summaryContent.innerHTML = `<img src="${school.logoUrl}" alt="" class="uni-logo" onerror="this.style.display='none'">`;
                }
                
                summaryContent.innerHTML += `<span>${school.name}</span>`;
                summary.appendChild(summaryContent);
                details.appendChild(summary);

                const content = document.createElement('div');
                content.className = 'details-interior';
                content.innerHTML = `
                    <div>
                        <h4>Resources &amp; Tours</h4>
                        ${school.transferLink ? `<p><a href="${school.transferLink}" target="_blank">Transfer Information Page ↗</a></p>` : '<p class="tbd-text">No link available</p>'}
                        ${school.tourLink ? `<p><a href="${school.tourLink}" target="_blank">Campus Virtual Tour ↗</a></p>` : ''}
                    </div>
                    <div>
                        <h4>Transfer Contact</h4>
                        <p>Email: ${school.email === 'TBD' ? '<span class="tbd-text">TBD</span>' : `<a href="mailto:${school.email}">${school.email}</a>`}</p>
                        <p>Phone: ${school.phone === 'TBD' ? '<span class="tbd-text">TBD</span>' : `<a href="tel:${school.phone}">${school.phone}</a>`}</p>
                    </div>
                `;
                
                details.appendChild(content);
                section.appendChild(details);
            });

            container.appendChild(section);
        });
    }

    // Run Engine
    fetchUniversities();
</script>
</body>
</html>
